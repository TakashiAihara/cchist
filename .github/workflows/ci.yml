name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Format check
        run: bun run format:check
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun test
      - name: Build (compile check)
        run: bun build src/index.ts --compile --outfile cchist
      - name: Verify binary
        run: ./cchist --help
